<!DOCTYPE html>
<html lang="et">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Digitaalne Kell - Uku Siim Kurm</title>

    <link rel="stylesheet" href="clock.css">
    <script src="clock.js" defer></script>
</head>

<body>

    <div id="container">

        <!-- clockcontainer -->
        <div id="clockContainer">
            <span id="hours">00</span>:
            <span id="minutes">00</span>:
            <span id="seconds">00</span>
        </div>

        <!-- datecontainer -->
        <div id="dateContainer">
            <span id="weekday">Esmaspäev</span>,
            <span id="day">01</span>.
            <span id="month">01</span>.
            <span id="year">2000</span>
        </div>

        <!-- buttoncontainer -->
        <div id="buttonContainer">

            <button id="bigger">+</button>
            <button id="smaller">-</button>

            <!-- functionid -->
            <button id="colorChange">🎨</button>
            <button id="toggleFormat">24h</button>
            <button id="moveClock">↔</button>

        </div>

        <!-- repo link -->
        <footer id="footer">
            <p>-> Uku Siim Kurm</p>
            <a href="https://github.com/ukusk/kodutoo-1" target="_blank">
                GitHub repository
            </a>
        </footer>

    </div>

</body>

</html>
